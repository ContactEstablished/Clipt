name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

jobs:
  build-test:
    name: Build and test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore Clipt.sln --configfile NuGet.Config -p:NuGetAudit=false

      - name: Build
        run: dotnet build Clipt.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test Clipt.sln --configuration Release --no-build --logger "trx;LogFilePrefix=clipt-tests" --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/**/*.trx
